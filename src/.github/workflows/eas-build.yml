name: EAS Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [ios, android]
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build on EAS (${{ matrix.platform }})
        run: eas build --platform ${{ matrix.platform }} --non-interactive
      
      - name: Submit to App Store/Play Store
        run: eas submit --platform ${{ matrix.platform }} --non-interactive --latest
      
      - name: Notify build status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = '${{ job.status }}' === 'success' ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: context.issue.number || 0,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${buildStatus} EAS Build for ${{ matrix.platform }} - ${{ job.status }}`
            });